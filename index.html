<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ CharacterVerse — Discover Your Game!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&family=Righteous&display=swap" rel="stylesheet">
<style>
  :root {
    --c1: #FF6B9D; --c2: #A78BFA; --c3: #34D399; --c4: #FBBF24;
    --c5: #60A5FA; --c6: #F87171; --dark: #0F0A1E; --light: #F8F4FF;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--dark);
    color: var(--light);
    min-height: 100vh;
    overflow-x: hidden;
  }

  #starfield {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse at 20% 50%, #1a0533 0%, #0F0A1E 60%),
                radial-gradient(ellipse at 80% 20%, #0d1a33 0%, transparent 50%);
  }
  .star {
    position: absolute; border-radius: 50%;
    background: white; animation: twinkle var(--d, 3s) ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.4); }
  }

  .float-emoji {
    position: fixed; font-size: 2rem; opacity: 0.07;
    animation: floatUp var(--fd, 15s) linear infinite;
    pointer-events: none; z-index: 0;
  }
  @keyframes floatUp {
    from { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.07; }
    90% { opacity: 0.07; }
    to { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  .page { display: none; position: relative; z-index: 1; min-height: 100vh; }
  .page.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .page-inner { width: 100%; max-width: 760px; padding: 2rem; }

  #landing { background: transparent; }
  .hero-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(3rem, 10vw, 6rem);
    text-align: center;
    background: linear-gradient(135deg, #FF6B9D, #A78BFA, #60A5FA, #34D399);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 40px rgba(167,139,250,0.5));
    animation: titlePulse 3s ease-in-out infinite;
    line-height: 1.1;
  }
  @keyframes titlePulse {
    0%,100% { filter: drop-shadow(0 0 40px rgba(167,139,250,0.5)); }
    50% { filter: drop-shadow(0 0 80px rgba(255,107,157,0.8)); }
  }
  .hero-sub {
    text-align: center; font-size: 1.3rem; color: #C4B5FD;
    margin: 1rem 0 2.5rem; font-weight: 600;
  }
  .hero-chars {
    display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap;
    margin-bottom: 2.5rem;
  }
  .hero-char-bubble {
    font-size: 2.5rem; background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.1); border-radius: 50%;
    width: 70px; height: 70px; display: flex; align-items: center; justify-content: center;
    animation: bounce var(--b, 2s) ease-in-out infinite;
    cursor: default;
    transition: transform 0.3s, background 0.3s;
  }
  .hero-char-bubble:hover {
    background: rgba(255,255,255,0.15);
    transform: scale(1.2) rotate(10deg) !important;
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 1rem 2.5rem; border-radius: 50px; font-family: 'Fredoka One', cursive;
    font-size: 1.2rem; cursor: pointer; border: none;
    transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
    position: relative; overflow: hidden;
  }
  .btn::before {
    content: ''; position: absolute; inset: 0;
    background: rgba(255,255,255,0.15);
    transform: translateX(-100%); transition: transform 0.3s;
  }
  .btn:hover::before { transform: translateX(0); }
  .btn:hover { transform: translateY(-4px) scale(1.05); box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: linear-gradient(135deg, #FF6B9D, #A78BFA);
    color: white; box-shadow: 0 8px 32px rgba(255,107,157,0.4);
  }
  .btn-secondary {
    background: linear-gradient(135deg, #60A5FA, #34D399);
    color: white; box-shadow: 0 8px 32px rgba(96,165,250,0.4);
  }
  .btn-gold {
    background: linear-gradient(135deg, #FBBF24, #F87171);
    color: white; box-shadow: 0 8px 32px rgba(251,191,36,0.4);
  }
  .btn-outline {
    background: transparent;
    border: 2px solid rgba(255,255,255,0.3);
    color: white;
  }
  .btn-outline:hover { border-color: #A78BFA; background: rgba(167,139,250,0.1); }

  .form-card {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 28px;
    padding: 2.5rem;
    box-shadow: 0 40px 120px rgba(0,0,0,0.5);
  }
  .form-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem; text-align: center; margin-bottom: 0.3rem;
    background: linear-gradient(90deg, #FF6B9D, #A78BFA);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .form-subtitle { text-align: center; color: #9CA3AF; margin-bottom: 2rem; font-size: 0.95rem; }
  .form-group { margin-bottom: 1.5rem; }
  label { display: block; font-weight: 700; margin-bottom: 0.5rem; color: #C4B5FD; font-size: 0.9rem; letter-spacing: 0.05em; text-transform: uppercase; }
  input[type="text"] {
    width: 100%; padding: 0.85rem 1.2rem;
    background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.1);
    border-radius: 14px; color: white; font-family: 'Nunito', sans-serif; font-size: 1rem;
    transition: all 0.3s;
  }
  input[type="text"]:focus {
    outline: none; border-color: #A78BFA;
    background: rgba(167,139,250,0.1); box-shadow: 0 0 0 4px rgba(167,139,250,0.15);
  }
  input[type="text"]::placeholder { color: #6B7280; }

  .char-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 0.75rem;
  }
  .char-option {
    padding: 0.8rem 0.5rem; border-radius: 16px; cursor: pointer;
    border: 2px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04); text-align: center;
    transition: all 0.25s cubic-bezier(.34,1.56,.64,1);
    user-select: none;
  }
  .char-option:hover { transform: translateY(-4px) scale(1.04); border-color: rgba(255,255,255,0.2); }
  .char-option.selected { border-color: #A78BFA; background: rgba(167,139,250,0.15); transform: scale(1.06); }
  .char-option .char-emoji { font-size: 2rem; margin-bottom: 0.3rem; }
  .char-option .char-name { font-size: 0.8rem; font-weight: 700; color: #E5E7EB; }

  #reveal-page .reveal-card {
    text-align: center;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px);
    border-radius: 32px;
    padding: 3rem 2rem;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 40px 120px rgba(0,0,0,0.6);
  }
  .reveal-emoji {
    font-size: 6rem;
    animation: revealBounce 0.6s cubic-bezier(.34,1.56,.64,1);
    display: block; margin-bottom: 1rem;
  }
  @keyframes revealBounce {
    from { transform: scale(0) rotate(-20deg); opacity: 0; }
    to { transform: scale(1) rotate(0); opacity: 1; }
  }
  .reveal-name {
    font-family: 'Fredoka One', cursive; font-size: 3rem;
    background: linear-gradient(135deg, #FF6B9D, #FBBF24);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .reveal-desc { color: #D1D5DB; margin: 1rem 0 2rem; font-size: 1.1rem; line-height: 1.6; }
  .reveal-games-label {
    font-family: 'Righteous', cursive; font-size: 1rem;
    color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem;
  }
  .game-cards-row {
    display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
  }
  .game-card {
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 20px; padding: 1.5rem;
    flex: 1; min-width: 200px; max-width: 280px;
    cursor: pointer; transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
    text-align: center;
  }
  .game-card:hover {
    transform: translateY(-8px) scale(1.04);
    border-color: var(--gc, #A78BFA);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 30px var(--gc, rgba(167,139,250,0.2));
    background: rgba(255,255,255,0.1);
  }
  .game-card-emoji { font-size: 3rem; margin-bottom: 0.75rem; }
  .game-card-title { font-family: 'Fredoka One', cursive; font-size: 1.3rem; margin-bottom: 0.4rem; }
  .game-card-desc { font-size: 0.85rem; color: #9CA3AF; }

  #game-page { min-height: 100vh; }
  .game-header {
    text-align: center; padding: 2rem 1rem 1rem;
    position: relative; z-index: 1;
  }
  .game-title-bar {
    font-family: 'Fredoka One', cursive; font-size: 2rem;
    display: inline-flex; align-items: center; gap: 0.5rem;
  }
  .game-area {
    max-width: 800px; margin: 0 auto; padding: 1rem 1.5rem 3rem;
  }

  /* SUDOKU */
  .sudoku-grid {
    display: grid; grid-template-columns: repeat(9, 1fr);
    gap: 2px; max-width: 450px; margin: 1.5rem auto;
    border: 3px solid #A78BFA; border-radius: 12px; overflow: hidden;
  }
  .sudoku-cell {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.04); font-size: clamp(0.8rem, 2vw, 1.1rem);
    font-weight: 700; cursor: pointer; transition: background 0.15s;
    border: 1px solid rgba(255,255,255,0.06);
    color: var(--light);
  }
  .sudoku-cell.given { color: #A78BFA; cursor: default; }
  .sudoku-cell.selected { background: rgba(167,139,250,0.3) !important; }
  .sudoku-cell.error { color: #F87171 !important; }
  .sudoku-cell:hover:not(.given) { background: rgba(255,255,255,0.08); }
  .sudoku-cell.box-right { border-right: 2px solid rgba(167,139,250,0.5); }
  .sudoku-cell.box-bottom { border-bottom: 2px solid rgba(167,139,250,0.5); }
  .num-pad {
    display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem;
  }
  .num-btn {
    width: 48px; height: 48px; border-radius: 12px;
    background: rgba(167,139,250,0.15); border: 2px solid rgba(167,139,250,0.3);
    color: white; font-size: 1.2rem; font-weight: 800; cursor: pointer;
    transition: all 0.2s; font-family: 'Nunito', sans-serif;
  }
  .num-btn:hover { background: rgba(167,139,250,0.4); transform: scale(1.1); }

  /* CHESS */
  .chess-board {
    display: grid; grid-template-columns: repeat(8, 1fr);
    max-width: 480px; margin: 1rem auto; border-radius: 12px; overflow: hidden;
    border: 3px solid #FBBF24; box-shadow: 0 20px 60px rgba(251,191,36,0.2);
  }
  .chess-cell {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-size: clamp(1.4rem, 4vw, 2rem); cursor: pointer; transition: all 0.2s;
    position: relative;
  }
  .chess-cell.light { background: rgba(251,191,36,0.15); }
  .chess-cell.dark { background: rgba(251,191,36,0.05); }
  .chess-cell.selected { background: rgba(251,191,36,0.4) !important; box-shadow: inset 0 0 0 3px #FBBF24; }
  .chess-cell.possible { background: rgba(52,211,153,0.3) !important; }
  .chess-cell:hover { filter: brightness(1.3); }

  /* JOKES */
  .joke-card {
    background: rgba(255,107,157,0.08); border: 2px solid rgba(255,107,157,0.3);
    border-radius: 24px; padding: 2.5rem; text-align: center; max-width: 550px; margin: 0 auto 1.5rem;
  }
  .joke-setup { font-size: 1.3rem; font-weight: 700; margin-bottom: 1.5rem; line-height: 1.5; }
  .joke-punchline { display: none; font-size: 1.5rem; font-weight: 800; color: #FF6B9D; line-height: 1.4; }
  .joke-punchline.show { display: block; animation: punchlineReveal 0.5s cubic-bezier(.34,1.56,.64,1); }
  @keyframes punchlineReveal { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .laugh-meter { display: flex; gap: 0.5rem; justify-content: center; margin-top: 1.5rem; }
  .laugh-btn { font-size: 2rem; cursor: pointer; transition: transform 0.2s; background: none; border: none; }
  .laugh-btn:hover { transform: scale(1.4) rotate(10deg); }

  /* WORD SCRAMBLE */
  .scramble-word {
    font-family: 'Fredoka One', cursive; font-size: 3rem; letter-spacing: 0.3em;
    text-align: center; color: #34D399; margin: 1rem 0;
    text-shadow: 0 0 30px rgba(52,211,153,0.5);
    animation: scramblePop 0.4s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes scramblePop { from { transform: scale(0.7) rotate(-5deg); } to { transform: scale(1) rotate(0); } }
  .scramble-input {
    display: block; margin: 1rem auto; width: 100%; max-width: 300px;
    padding: 1rem; text-align: center; font-size: 1.5rem; font-family: 'Fredoka One', cursive;
    background: rgba(52,211,153,0.1); border: 2px solid rgba(52,211,153,0.4);
    border-radius: 14px; color: white; letter-spacing: 0.2em;
  }
  .scramble-input:focus { outline: none; border-color: #34D399; box-shadow: 0 0 0 4px rgba(52,211,153,0.15); }

  /* MEMORY */
  .memory-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 0.75rem; max-width: 420px; margin: 1.5rem auto;
  }
  .memory-card {
    aspect-ratio: 1; border-radius: 14px; cursor: pointer;
    perspective: 800px; position: relative;
  }
  .memory-card-inner {
    width: 100%; height: 100%; position: relative;
    transform-style: preserve-3d; transition: transform 0.4s;
  }
  .memory-card.flipped .memory-card-inner,
  .memory-card.matched .memory-card-inner { transform: rotateY(180deg); }
  .memory-card-front, .memory-card-back {
    position: absolute; inset: 0; backface-visibility: hidden; border-radius: 14px;
    display: flex; align-items: center; justify-content: center; font-size: 2.2rem;
  }
  .memory-card-front { background: linear-gradient(135deg, #A78BFA, #60A5FA); }
  .memory-card-back { background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.15); transform: rotateY(180deg); }
  .memory-card.matched .memory-card-back { background: rgba(52,211,153,0.2); border-color: #34D399; }

  /* QUIZ */
  .quiz-question {
    font-size: 1.3rem; font-weight: 700; text-align: center;
    background: rgba(255,255,255,0.05); border-radius: 20px;
    padding: 1.5rem; margin-bottom: 1.5rem; line-height: 1.5;
  }
  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .quiz-option {
    padding: 1rem; border-radius: 14px; cursor: pointer;
    background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.1);
    font-weight: 700; transition: all 0.2s; text-align: center; font-size: 0.95rem;
  }
  .quiz-option:hover:not(.answered) { background: rgba(167,139,250,0.15); border-color: #A78BFA; transform: scale(1.03); }
  .quiz-option.correct { background: rgba(52,211,153,0.2); border-color: #34D399; color: #34D399; }
  .quiz-option.wrong { background: rgba(248,113,113,0.2); border-color: #F87171; color: #F87171; }

  /* EMOJI PUZZLE */
  .emoji-puzzle-area {
    text-align: center; max-width: 550px; margin: 0 auto;
  }
  .emoji-row {
    font-size: 3rem; letter-spacing: 0.5rem; margin: 1.5rem 0;
    animation: pulseRow 2s ease-in-out infinite;
  }
  @keyframes pulseRow { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  .emoji-options {
    display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0;
  }
  .emoji-option-btn {
    font-size: 2.5rem; padding: 0.5rem; border-radius: 16px; cursor: pointer;
    background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.1);
    transition: all 0.2s; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center;
  }
  .emoji-option-btn:hover { transform: scale(1.2) rotate(10deg); background: rgba(255,255,255,0.12); border-color: #FBBF24; }

  /* RIDDLE */
  .riddle-card {
    background: rgba(96,165,250,0.08); border: 2px solid rgba(96,165,250,0.3);
    border-radius: 24px; padding: 2.5rem; text-align: center; max-width: 550px; margin: 0 auto 1.5rem;
  }
  .riddle-text { font-size: 1.3rem; font-weight: 700; line-height: 1.6; margin-bottom: 1.5rem; }
  .riddle-input {
    width: 100%; max-width: 280px; padding: 0.8rem 1.2rem;
    background: rgba(96,165,250,0.1); border: 2px solid rgba(96,165,250,0.4);
    border-radius: 12px; color: white; font-size: 1rem; text-align: center;
    font-family: 'Nunito', sans-serif; display: block; margin: 0 auto 1rem;
  }
  .riddle-input:focus { outline: none; border-color: #60A5FA; }

  /* TYPING */
  .typing-area { max-width: 600px; margin: 0 auto; }
  .typing-display {
    background: rgba(255,255,255,0.05); border-radius: 16px; padding: 1.5rem;
    font-size: 1.1rem; line-height: 1.8; margin-bottom: 1rem; min-height: 80px;
  }
  .typing-display .correct-char { color: #34D399; }
  .typing-display .wrong-char { color: #F87171; background: rgba(248,113,113,0.15); border-radius: 2px; }
  .typing-display .cursor-char { border-bottom: 3px solid #A78BFA; }
  .typing-input {
    width: 100%; padding: 1rem; border-radius: 14px;
    background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.1);
    color: white; font-size: 1rem; font-family: 'Nunito', sans-serif;
  }
  .typing-input:focus { outline: none; border-color: #A78BFA; }
  .typing-stats {
    display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem;
  }
  .stat-box {
    background: rgba(255,255,255,0.06); border-radius: 12px; padding: 0.75rem 1.25rem; text-align: center;
  }
  .stat-val { font-family: 'Fredoka One', cursive; font-size: 1.8rem; color: #A78BFA; }
  .stat-lbl { font-size: 0.75rem; color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.05em; }

  /* PATTERN */
  .pattern-grid {
    display: grid; grid-template-columns: repeat(4,1fr);
    gap: 0.5rem; max-width: 350px; margin: 1.5rem auto;
  }
  .pattern-cell {
    aspect-ratio: 1; border-radius: 12px; cursor: pointer;
    background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.1);
    transition: all 0.15s; display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
  }
  .pattern-cell.lit { background: var(--gc, #A78BFA); box-shadow: 0 0 20px var(--gc, rgba(167,139,250,0.6)); border-color: transparent; }
  .pattern-cell:hover { transform: scale(1.08); }

  /* HANGMAN */
  .hangman-display { text-align: center; margin: 1.5rem auto; max-width: 500px; }
  .hangman-word {
    display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin: 1.5rem 0;
  }
  .hangman-letter {
    width: 40px; height: 50px; border-bottom: 3px solid #A78BFA;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fredoka One', cursive; font-size: 1.5rem; color: white;
  }
  .hangman-keyboard {
    display: flex; gap: 0.4rem; justify-content: center; flex-wrap: wrap; max-width: 420px; margin: 0 auto;
  }
  .hangman-key {
    width: 38px; height: 38px; border-radius: 8px;
    background: rgba(167,139,250,0.15); border: 2px solid rgba(167,139,250,0.3);
    color: white; font-weight: 700; cursor: pointer; font-size: 0.9rem;
    transition: all 0.2s; font-family: 'Nunito', sans-serif;
  }
  .hangman-key:hover:not(:disabled) { background: rgba(167,139,250,0.4); transform: scale(1.1); }
  .hangman-key:disabled { opacity: 0.3; cursor: default; }
  .hangman-key.wrong { background: rgba(248,113,113,0.2); border-color: #F87171; }
  .hangman-key.correct { background: rgba(52,211,153,0.2); border-color: #34D399; }
  .lives-display { font-size: 2rem; text-align: center; margin: 0.5rem 0; }

  /* ========== FRUIT CUTTING GAME ========== */
  #fruit-canvas-wrap {
    position: relative; max-width: 550px; margin: 0 auto;
    border-radius: 20px; overflow: hidden;
    border: 2px solid rgba(255,255,255,0.1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    cursor: crosshair;
  }
  #fruitCanvas { display: block; width: 100%; background: linear-gradient(180deg, #1a0a2e 0%, #0d1a1a 100%); }
  .fruit-hud {
    display: flex; gap: 1rem; justify-content: center; align-items: center;
    background: rgba(255,255,255,0.05); border-radius: 14px;
    padding: 0.75rem 1.5rem; margin-bottom: 1rem; flex-wrap: wrap;
  }
  .fruit-score-box { text-align: center; }
  .fruit-score-val { font-family: 'Fredoka One', cursive; font-size: 2rem; color: #FBBF24; }
  .fruit-score-lbl { font-size: 0.75rem; color: #9CA3AF; text-transform: uppercase; }

  /* ========== FOOD QUIZ GAME ========== */
  .food-quiz-card {
    background: rgba(251,191,36,0.06); border: 2px solid rgba(251,191,36,0.25);
    border-radius: 24px; padding: 2rem; max-width: 580px; margin: 0 auto;
  }
  .food-question { font-size: 1.4rem; font-weight: 800; text-align: center; margin-bottom: 1.5rem; line-height: 1.5; }
  .food-options { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .food-opt-btn {
    padding: 1rem; border-radius: 14px; cursor: pointer; border: 2px solid rgba(251,191,36,0.2);
    background: rgba(251,191,36,0.08); font-weight: 700; font-family: 'Nunito', sans-serif;
    font-size: 1rem; color: white; transition: all 0.2s; text-align: center;
  }
  .food-opt-btn:hover:not(:disabled) { background: rgba(251,191,36,0.2); border-color: #FBBF24; transform: scale(1.03); }
  .food-opt-btn.correct { background: rgba(52,211,153,0.2); border-color: #34D399; color: #34D399; }
  .food-opt-btn.wrong { background: rgba(248,113,113,0.2); border-color: #F87171; color: #F87171; }

  /* ========== SHOPPING DASH GAME ========== */
  .shop-area { max-width: 600px; margin: 0 auto; text-align: center; }
  .shop-list-card {
    background: rgba(255,107,157,0.07); border: 2px solid rgba(255,107,157,0.25);
    border-radius: 20px; padding: 1.5rem; margin-bottom: 1rem; text-align: left;
  }
  .shop-list-title { font-family: 'Fredoka One', cursive; font-size: 1.2rem; color: #FF6B9D; margin-bottom: 0.75rem; }
  .shop-item-row {
    display: flex; align-items: center; gap: 0.6rem; padding: 0.4rem 0;
    font-size: 1rem; font-weight: 600; color: #E5E7EB;
  }
  .shop-item-row.checked { text-decoration: line-through; color: #6B7280; }
  .shop-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.75rem; margin: 1rem 0; }
  .shop-item-btn {
    padding: 0.9rem 0.5rem; border-radius: 14px; cursor: pointer;
    border: 2px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05);
    font-size: 0.9rem; font-weight: 700; color: white; transition: all 0.2s;
    font-family: 'Nunito', sans-serif; text-align: center;
  }
  .shop-item-btn:hover:not(:disabled) { background: rgba(255,107,157,0.15); border-color: #FF6B9D; transform: translateY(-3px); }
  .shop-item-btn.correct-pick { background: rgba(52,211,153,0.2); border-color: #34D399; }
  .shop-item-btn.wrong-pick { background: rgba(248,113,113,0.2); border-color: #F87171; animation: shake 0.3s; }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
  .budget-bar { background: rgba(255,255,255,0.06); border-radius: 12px; padding: 0.75rem 1.25rem; margin-bottom: 1rem; }
  .budget-display { font-family: 'Fredoka One', cursive; font-size: 1.5rem; color: #34D399; }

  /* ========== FASHION MATCH GAME ========== */
  .fashion-area { max-width: 560px; margin: 0 auto; text-align: center; }
  .outfit-display {
    display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0;
  }
  .outfit-piece {
    background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.12);
    border-radius: 16px; padding: 1rem; min-width: 100px; text-align: center;
    transition: all 0.3s;
  }
  .outfit-piece.matched { border-color: #34D399; background: rgba(52,211,153,0.1); }
  .outfit-piece-emoji { font-size: 2.5rem; display: block; margin-bottom: 0.3rem; }
  .outfit-piece-label { font-size: 0.8rem; color: #9CA3AF; font-weight: 700; text-transform: uppercase; }
  .fashion-options { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.6rem; margin-top: 1rem; }
  .fashion-opt {
    padding: 0.8rem; border-radius: 14px; cursor: pointer;
    border: 2px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05);
    font-size: 0.9rem; font-weight: 700; color: white; transition: all 0.2s;
    font-family: 'Nunito', sans-serif; text-align: center;
  }
  .fashion-opt:hover:not(:disabled) { background: rgba(167,139,250,0.15); border-color: #A78BFA; transform: scale(1.05); }
  .fashion-opt.correct { background: rgba(52,211,153,0.2); border-color: #34D399; color: #34D399; }
  .fashion-opt.wrong { background: rgba(248,113,113,0.2); border-color: #F87171; color: #F87171; }

  /* WIN SCREEN */
  .win-screen {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(15,10,30,0.95); backdrop-filter: blur(10px);
    align-items: center; justify-content: center;
  }
  .win-screen.show { display: flex; }
  .win-box {
    text-align: center; padding: 3rem;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 32px; max-width: 480px; width: 90%;
    animation: winPop 0.6s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes winPop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .win-emoji { font-size: 5rem; animation: spin 2s linear infinite; display: block; margin-bottom: 1rem; }
  @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
  .win-title { font-family: 'Fredoka One', cursive; font-size: 3rem; background: linear-gradient(90deg, #FF6B9D, #FBBF24, #34D399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

  .confetti-piece {
    position: fixed; width: 10px; height: 10px; z-index: 200;
    animation: confettifall 2.5s ease-in forwards;
    pointer-events: none; border-radius: 2px;
  }
  @keyframes confettifall {
    0% { transform: translateY(-10px) rotate(0); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  #music-toggle {
    position: fixed; top: 1rem; right: 1rem; z-index: 50;
    background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2); border-radius: 50%;
    width: 50px; height: 50px; cursor: pointer; font-size: 1.3rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  #music-toggle:hover { transform: scale(1.1); background: rgba(255,255,255,0.15); }

  #back-btn {
    position: fixed; top: 1rem; left: 1rem; z-index: 50;
    background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2); border-radius: 50px;
    padding: 0.5rem 1rem; cursor: pointer; font-size: 0.9rem; font-weight: 700;
    display: none; align-items: center; gap: 0.4rem;
    transition: all 0.3s; color: white; font-family: 'Nunito', sans-serif;
  }
  #back-btn:hover { background: rgba(255,255,255,0.2); transform: translateX(-3px); }

  .score-bar {
    display: flex; align-items: center; gap: 1rem; justify-content: center;
    background: rgba(255,255,255,0.05); border-radius: 12px; padding: 0.75rem 1.5rem;
    margin-bottom: 1rem; flex-wrap: wrap;
  }
  .score-val { font-family: 'Fredoka One', cursive; font-size: 1.5rem; color: #FBBF24; }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in-up { animation: fadeInUp 0.5s ease forwards; }
  .fade-in-up:nth-child(2) { animation-delay: 0.1s; }
  .fade-in-up:nth-child(3) { animation-delay: 0.2s; }
  .fade-in-up:nth-child(4) { animation-delay: 0.3s; }

  @media (max-width: 500px) {
    .chess-board { font-size: 1rem; }
    .quiz-options { grid-template-columns: 1fr; }
    .food-options { grid-template-columns: 1fr; }
    .memory-grid { grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
    .shop-grid { grid-template-columns: repeat(2,1fr); }
    .fashion-options { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>
<body>

<div id="starfield"></div>
<button id="music-toggle" title="Toggle music">🎵</button>
<button id="back-btn">← Back</button>

<div class="win-screen" id="win-screen">
  <div class="win-box">
    <span class="win-emoji" id="win-emoji">🏆</span>
    <div class="win-title" id="win-title">You Won!</div>
    <p style="color:#9CA3AF;margin:1rem 0 2rem" id="win-msg">Amazing job!</p>
    <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-primary" id="play-again-btn">🔄 Play Again</button>
      <button class="btn btn-secondary" id="choose-game-btn">🎮 Choose Game</button>
    </div>
  </div>
</div>

<!-- LANDING -->
<div class="page active" id="landing-page">
  <div class="page-inner" style="text-align:center">
    <h1 class="hero-title">CharacterVerse</h1>
    <p class="hero-sub">Discover your inner character & unlock your perfect games! ✨</p>
    <div class="hero-chars" id="hero-chars"></div>
    <button class="btn btn-primary" onclick="showPage('form-page')" style="font-size:1.4rem;padding:1.2rem 3rem">
      🚀 Start Your Journey
    </button>
    <p style="color:#4B5563;margin-top:1rem;font-size:0.9rem">Fill a quick form → Get matched → Play!</p>
  </div>
</div>

<!-- FORM -->
<div class="page" id="form-page">
  <div class="page-inner">
    <div class="form-card">
      <h2 class="form-title">🌟 Who Are You?</h2>
      <p class="form-subtitle">Tell us about yourself and we'll match you with the perfect character & games!</p>
      <div class="form-group fade-in-up">
        <label>Your Name</label>
        <input type="text" id="player-name" placeholder="e.g. Sara, Ahmed, Zara...">
      </div>
      <div class="form-group fade-in-up">
        <label>🎭 Pick Your Character Type</label>
        <div class="char-grid" id="char-grid"></div>
      </div>
      <div style="text-align:center;margin-top:2rem">
        <button class="btn btn-primary" onclick="submitForm()" style="padding:1rem 3rem">
          ✨ Reveal My Character!
        </button>
      </div>
    </div>
  </div>
</div>

<!-- REVEAL -->
<div class="page" id="reveal-page">
  <div class="page-inner">
    <div class="reveal-card" id="reveal-card">
      <span class="reveal-emoji" id="reveal-emoji">🌟</span>
      <div class="reveal-name" id="reveal-char-name">Character</div>
      <p class="reveal-desc" id="reveal-desc">Description</p>
      <div class="reveal-games-label">🎮 Your Matched Games</div>
      <div class="game-cards-row" id="game-cards-row"></div>
    </div>
  </div>
</div>

<!-- GAME -->
<div class="page" id="game-page">
  <div class="game-header">
    <div class="game-title-bar" id="game-title-bar">Game</div>
    <div class="score-bar" id="score-bar" style="display:none"></div>
  </div>
  <div class="game-area" id="game-area"></div>
</div>

<script>
// ============================================================
// DATA
// ============================================================
const CHARACTERS = [
  {
    id: 'genius', name: 'The Genius 🧠', emoji: '🧠', label: 'Intelligent / Logical',
    desc: 'You solve problems before others even understand them. Logic is your superpower!',
    color: '#A78BFA', games: ['sudoku', 'chess']
  },
  {
    id: 'funny', name: 'The Comedian 😂', emoji: '😂', label: 'Funny / Humorous',
    desc: 'Life is a stage and you\'re always the star! Your jokes make everyone laugh.',
    color: '#FF6B9D', games: ['jokes', 'emoji_puzzle']
  },
  {
    id: 'shopaholic', name: 'The Shopaholic 🛍️', emoji: '🛍️', label: 'Loves Shopping',
    desc: 'Retail therapy is real therapy! You know every sale before it starts.',
    color: '#F87171', games: ['shopping_dash', 'fashion_match']
  },
  {
    id: 'adventurer', name: 'The Adventurer 🗺️', emoji: '🗺️', label: 'Bold & Adventurous',
    desc: 'You jump first, look later. Every day is a new expedition!',
    color: '#34D399', games: ['hangman', 'pattern']
  },
  {
    id: 'bookworm', name: 'The Bookworm 📚', emoji: '📚', label: 'Love Reading',
    desc: 'You\'ve read more books than most people know exist. Words are your universe.',
    color: '#60A5FA', games: ['word_scramble', 'riddle']
  },
  {
    id: 'artistic', name: 'The Artist 🎨', emoji: '🎨', label: 'Creative & Artistic',
    desc: 'You see beauty in everything. Colors, shapes, and patterns speak to your soul.',
    color: '#FBBF24', games: ['memory', 'pattern']
  },
  {
    id: 'athlete', name: 'The Athlete 🏆', emoji: '🏆', label: 'Sporty & Competitive',
    desc: 'Second place doesn\'t exist in your dictionary. You play to WIN!',
    color: '#F87171', games: ['typing', 'pattern']
  },
  {
    id: 'foodie', name: 'The Foodie 🍕', emoji: '🍕', label: 'Loves Food',
    desc: 'You eat first, Instagram later. Every meal is a world tour!',
    color: '#FBBF24', games: ['fruit_cutting', 'food_quiz']
  },
  {
    id: 'dreamer', name: 'The Dreamer ✨', emoji: '✨', label: 'Imaginative / Dreamer',
    desc: 'Reality is overrated. Your imagination builds universes while others sleep.',
    color: '#A78BFA', games: ['riddle', 'hangman']
  },
  {
    id: 'techie', name: 'The Techie 💻', emoji: '💻', label: 'Tech Lover / Geek',
    desc: 'You\'ve already automated everything. Dark mode is a personality trait.',
    color: '#60A5FA', games: ['sudoku', 'typing']
  }
];

const GAMES = {
  sudoku:        { title:'Sudoku Master',     emoji:'🔢', color:'#A78BFA', desc:'Fill the grid — every row, column & 3×3 box must have 1-9.', init:initSudoku },
  chess:         { title:'Mini Chess',        emoji:'♟️', color:'#FBBF24', desc:'Strategic chess puzzles — find the best move!', init:initChess },
  jokes:         { title:'Joke Battle',       emoji:'😂', color:'#FF6B9D', desc:'Guess the punchline or just laugh out loud!', init:initJokes },
  emoji_puzzle:  { title:'Emoji Quiz',        emoji:'🤔', color:'#FBBF24', desc:'Decode the emoji sequence — what movie/phrase is it?', init:initEmojiPuzzle },
  memory:        { title:'Memory Match',      emoji:'🧩', color:'#34D399', desc:'Flip and match all the pairs to win!', init:initMemory },
  word_scramble: { title:'Word Unscramble',   emoji:'🔤', color:'#60A5FA', desc:'Unscramble the letters to find the hidden word!', init:initWordScramble },
  hangman:       { title:'Hangman',           emoji:'🕹️', color:'#A78BFA', desc:'Guess the word letter by letter before time runs out!', init:initHangman },
  pattern:       { title:'Pattern Simon',     emoji:'🎯', color:'#FF6B9D', desc:'Watch the pattern then repeat it — how far can you go?', init:initPattern },
  riddle:        { title:'Riddle Master',     emoji:'🔮', color:'#60A5FA', desc:'Think carefully — can you crack these tricky riddles?', init:initRiddle },
  typing:        { title:'Speed Typing',      emoji:'⌨️', color:'#34D399', desc:'Type as fast as you can — beat your high score!', init:initTyping },
  // NEW GAMES
  fruit_cutting: { title:'Fruit Slicer',      emoji:'🍉', color:'#F87171', desc:'Slice falling fruits before they drop — don\'t miss! 🍓🍊🍋', init:initFruitCutting },
  food_quiz:     { title:'Food Guru Quiz',    emoji:'🍜', color:'#FBBF24', desc:'How well do you know world cuisines & food facts?', init:initFoodQuiz },
  shopping_dash: { title:'Shopping Dash',     emoji:'🛒', color:'#FF6B9D', desc:'Buy all the items on your list within budget!', init:initShoppingDash },
  fashion_match: { title:'Fashion Match',     emoji:'👗', color:'#A78BFA', desc:'Match the perfect outfit pieces together!', init:initFashionMatch }
};

// ============================================================
// STATE
// ============================================================
let currentChar = null, currentGame = null, playerName = '';
let gameState = {};

// ============================================================
// BACKGROUND
// ============================================================
function setupStarfield() {
  const sf = document.getElementById('starfield');
  for (let i = 0; i < 150; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 3 + 1;
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;animation-delay:${Math.random()*5}s`;
    sf.appendChild(s);
  }
  const emojis = ['🎮','⭐','💫','🎯','🌟','✨','🎪','🎭','🎨','🎲','🃏','🎸','🌈','🚀'];
  for (let i = 0; i < 12; i++) {
    const e = document.createElement('div');
    e.className = 'float-emoji';
    e.textContent = emojis[i % emojis.length];
    e.style.cssText = `left:${Math.random()*95}%;--fd:${12+Math.random()*15}s;animation-delay:${Math.random()*15}s`;
    document.body.appendChild(e);
  }
}

function setupHeroChars() {
  const c = document.getElementById('hero-chars');
  CHARACTERS.forEach((ch, i) => {
    const b = document.createElement('div');
    b.className = 'hero-char-bubble';
    b.textContent = ch.emoji;
    b.style.cssText = `--b:${1.5+i*0.2}s;animation-delay:${i*0.1}s`;
    b.title = ch.name;
    c.appendChild(b);
  });
}

function setupCharGrid() {
  const g = document.getElementById('char-grid');
  CHARACTERS.forEach(ch => {
    const d = document.createElement('div');
    d.className = 'char-option';
    d.innerHTML = `<div class="char-emoji">${ch.emoji}</div><div class="char-name">${ch.label}</div>`;
    d.onclick = () => selectChar(ch.id, d);
    g.appendChild(d);
  });
}

// ============================================================
// NAVIGATION
// ============================================================
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const backBtn = document.getElementById('back-btn');
  if (id === 'landing-page') backBtn.style.display = 'none';
  else {
    backBtn.style.display = 'flex';
    backBtn.onclick = () => showPage(id === 'game-page' ? 'reveal-page' : id === 'reveal-page' ? 'form-page' : 'landing-page');
  }
}

let selectedCharId = null;
function selectChar(id, el) {
  document.querySelectorAll('.char-option').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selectedCharId = id;
}

function submitForm() {
  const name = document.getElementById('player-name').value.trim();
  if (!name) { alert('Please enter your name! 😊'); return; }
  if (!selectedCharId) { alert('Please select a character type! 🎭'); return; }
  playerName = name;
  currentChar = CHARACTERS.find(c => c.id === selectedCharId);
  showReveal();
}

// ============================================================
// REVEAL
// ============================================================
function showReveal() {
  document.getElementById('reveal-emoji').textContent = currentChar.emoji;
  document.getElementById('reveal-char-name').textContent = `${playerName} is a ${currentChar.name}`;
  document.getElementById('reveal-desc').textContent = currentChar.desc;

  const row = document.getElementById('game-cards-row');
  row.innerHTML = '';
  currentChar.games.forEach(gid => {
    const g = GAMES[gid];
    const card = document.createElement('div');
    card.className = 'game-card';
    card.style.setProperty('--gc', g.color);
    card.innerHTML = `<div class="game-card-emoji">${g.emoji}</div><div class="game-card-title">${g.title}</div><div class="game-card-desc">${g.desc}</div>`;
    card.onclick = () => launchGame(gid);
    row.appendChild(card);
  });
  spawnConfetti();
  showPage('reveal-page');
}

// ============================================================
// GAME LAUNCH
// ============================================================
function launchGame(gid) {
  currentGame = gid;
  const g = GAMES[gid];
  document.getElementById('game-title-bar').textContent = `${g.emoji} ${g.title}`;
  document.getElementById('score-bar').style.display = 'none';
  document.getElementById('game-area').innerHTML = '<div style="text-align:center;padding:2rem;color:#9CA3AF">Loading game…</div>';
  showPage('game-page');
  setTimeout(() => g.init(), 100);
}

// ============================================================
// WIN / CONFETTI
// ============================================================
function showWin(msg = 'Amazing!', emoji = '🏆', title = 'You Won!') {
  document.getElementById('win-emoji').textContent = emoji;
  document.getElementById('win-title').textContent = title;
  document.getElementById('win-msg').textContent = `${playerName}, ${msg}`;
  document.getElementById('win-screen').classList.add('show');
  spawnConfetti();
}
document.getElementById('play-again-btn').onclick = () => {
  document.getElementById('win-screen').classList.remove('show');
  launchGame(currentGame);
};
document.getElementById('choose-game-btn').onclick = () => {
  document.getElementById('win-screen').classList.remove('show');
  showPage('reveal-page');
};

function spawnConfetti() {
  const colors = ['#FF6B9D','#A78BFA','#34D399','#FBBF24','#60A5FA','#F87171'];
  for (let i = 0; i < 80; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.cssText = `left:${Math.random()*100}%;background:${colors[~~(Math.random()*colors.length)]};animation-delay:${Math.random()*1.5}s;animation-duration:${2+Math.random()}s;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'}`;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
}

// ============================================================
// MUSIC
// ============================================================
let audioCtx = null, musicPlaying = false, musicNodes = [];
const musicBtn = document.getElementById('music-toggle');
musicBtn.onclick = toggleMusic;

function toggleMusic() {
  if (musicPlaying) { stopMusic(); musicBtn.textContent = '🔇'; }
  else { playMusic(); musicBtn.textContent = '🎵'; }
}

function playMusic() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [261.63, 293.66, 329.63, 349.23, 392, 440, 493.88, 523.25];
    const progression = [0, 3, 4, 2];
    let step = 0;
    const master = audioCtx.createGain();
    master.gain.value = 0.06;
    master.connect(audioCtx.destination);
    musicNodes.push(master);

    const playNote = () => {
      if (!musicPlaying) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = ['sine','triangle','sine'][~~(Math.random()*3)];
      osc.frequency.value = notes[progression[step % 4]] * (Math.random() > 0.7 ? 2 : 1);
      gain.gain.setValueAtTime(0, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.8);
      osc.connect(gain); gain.connect(master);
      osc.start(); osc.stop(audioCtx.currentTime + 2);
      step++;
      setTimeout(playNote, 600 + Math.random() * 400);
    };
    musicPlaying = true;
    playNote();
  } catch(e) {}
}

function stopMusic() {
  musicPlaying = false;
  musicNodes.forEach(n => { try { n.disconnect(); } catch(e){} });
  musicNodes = [];
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
}

function initSudoku() {
  const base = [
    [5,3,0,0,7,0,0,0,0],[6,0,0,1,9,5,0,0,0],[0,9,8,0,0,0,0,6,0],
    [8,0,0,0,6,0,0,0,3],[4,0,0,8,0,3,0,0,1],[7,0,0,0,2,0,0,0,6],
    [0,6,0,0,0,0,2,8,0],[0,0,0,4,1,9,0,0,5],[0,0,0,0,8,0,0,7,9]
  ];
  const solution = [
    [5,3,4,6,7,8,9,1,2],[6,7,2,1,9,5,3,4,8],[1,9,8,3,4,2,5,6,7],
    [8,5,9,7,6,1,4,2,3],[4,2,6,8,5,3,7,9,1],[7,1,3,9,2,4,8,5,6],
    [9,6,1,5,3,7,2,8,4],[2,8,7,4,1,9,6,3,5],[3,4,5,2,8,6,1,7,9]
  ];
  const board = base.map(r => [...r]);
  let selected = null, errors = 0;

  const area = document.getElementById('game-area');
  area.innerHTML = `
    <p style="text-align:center;color:#9CA3AF;margin-bottom:0.5rem">Fill in the missing numbers (1-9)</p>
    <div class="sudoku-grid" id="sg"></div>
    <div class="num-pad" id="np"></div>
    <div style="text-align:center;margin-top:1rem"><span id="err-count" style="color:#F87171;font-weight:700">Errors: 0</span></div>
  `;

  const grid = document.getElementById('sg');
  const cells = [];
  for (let r = 0; r < 9; r++) {
    for (let c = 0; c < 9; c++) {
      const cell = document.createElement('div');
      cell.className = 'sudoku-cell' + (base[r][c] ? ' given' : '');
      if (c === 2 || c === 5) cell.classList.add('box-right');
      if (r === 2 || r === 5) cell.classList.add('box-bottom');
      cell.textContent = base[r][c] || '';
      cell.dataset.r = r; cell.dataset.c = c;
      if (!base[r][c]) cell.onclick = () => {
        cells.flat().forEach(x => x.classList.remove('selected'));
        cell.classList.add('selected'); selected = {r, c};
      };
      cells.push(cell);
      grid.appendChild(cell);
    }
  }

  const np = document.getElementById('np');
  for (let n = 1; n <= 9; n++) {
    const btn = document.createElement('button');
    btn.className = 'num-btn'; btn.textContent = n;
    btn.onclick = () => {
      if (!selected) return;
      const {r,c} = selected;
      if (base[r][c]) return;
      const cell = cells[r*9+c];
      if (n === solution[r][c]) {
        board[r][c] = n; cell.textContent = n; cell.style.color = '#34D399';
        cell.classList.remove('error','selected'); selected = null;
        if (board.every((row,ri) => row.every((v,ci) => v === solution[ri][ci])))
          setTimeout(() => showWin('You solved the Sudoku! 🧠', '🧠', 'Sudoku Solved!'), 300);
      } else {
        errors++;
        cell.textContent = n; cell.classList.add('error');
        document.getElementById('err-count').textContent = `Errors: ${errors}`;
        setTimeout(() => { cell.textContent = ''; cell.classList.remove('error'); }, 1000);
      }
    };
    np.appendChild(btn);
  }
}

// GAME 8: PATTERN SIMON
// ============================================================
function initPattern() {
  const emojis = ['🔴','🔵','🟡','🟢','🟣','🟠','⚪','🟤'];
  let sequence = [], playerSeq = [], level = 1, playerTurn = false, score = 0;

  const area = document.getElementById('game-area');
  area.innerHTML = `
    <div style="text-align:center">
      <p style="color:#9CA3AF;margin-bottom:0.5rem">Watch the pattern, then repeat it!</p>
      <p>Level: <span id="pat-lvl" style="color:#FF6B9D;font-weight:700">1</span> • Score: <span id="pat-sc" style="color:#FF6B9D;font-weight:700">0</span></p>
      <div class="pattern-grid" id="pg"></div>
      <div id="pat-msg" style="font-weight:700;min-height:1.5rem;margin-top:0.5rem;color:#9CA3AF">Watch carefully…</div>
      <button class="btn btn-primary" id="pat-start" style="margin-top:1rem" onclick="startPattern()">▶ Start!</button>
    </div>
  `;

  const cells = [];
  const pg = document.getElementById('pg');
  emojis.forEach((em, i) => {
    const c = document.createElement('div');
    c.className = 'pattern-cell'; c.textContent = em;
    c.onclick = () => {
      if (!playerTurn) return;
      playerSeq.push(i);
      flashCell(c, '#A78BFA');
      const pos = playerSeq.length - 1;
      if (playerSeq[pos] !== sequence[pos]) {
        document.getElementById('pat-msg').innerHTML = `<span style="color:#F87171">❌ Wrong! Game over at level ${level}</span>`;
        playerTurn = false;
        document.getElementById('pat-start').style.display = '';
        document.getElementById('pat-start').textContent = '🔄 Play Again';
        return;
      }
      if (playerSeq.length === sequence.length) {
        score += level; level++;
        document.getElementById('pat-sc').textContent = score;
        document.getElementById('pat-lvl').textContent = level;
        document.getElementById('pat-msg').textContent = '✅ Correct! Watch next…';
        playerSeq = []; playerTurn = false;
        if (level > 10) { showWin(`All 10 levels done! Score: ${score}`,'🎯','Pattern Pro!'); return; }
        setTimeout(playSequence, 1000);
      }
    };
    cells.push(c);
    pg.appendChild(c);
  });

  function flashCell(c, color) {
    c.style.background = color; c.style.boxShadow = `0 0 20px ${color}`;
    setTimeout(() => { c.style.background=''; c.style.boxShadow=''; }, 400);
  }

  function playSequence() {
    document.getElementById('pat-msg').textContent = 'Watch the pattern…';
    playerTurn = false;
    sequence.push(~~(Math.random()*8));
    let i = 0;
    const iv = setInterval(() => {
      flashCell(cells[sequence[i]], '#FF6B9D'); i++;
      if (i >= sequence.length) {
        clearInterval(iv);
        setTimeout(() => { playerTurn = true; document.getElementById('pat-msg').textContent = 'Your turn!'; }, 400);
      }
    }, 700);
  }

  window.startPattern = () => {

function initTyping() {
  const sentences = [
    "The quick brown fox jumps over the lazy dog",
    "Stars shine brightest on the darkest nights",
    "Adventure awaits those who dare to dream",
    "Every great journey begins with a single step",
    "Knowledge is the key that unlocks every door"
  ];
  let sIdx = 0, startTime = null, finished = false, bestWPM = 0;

  const render = () => {
    const sentence = sentences[sIdx];
    document.getElementById('game-area').innerHTML = `
      <div class="typing-area">
        <div class="typing-display" id="td"></div>
        <input class="typing-input" id="ti" placeholder="Start typing here…" autocomplete="off" autocorrect="off" spellcheck="false">
        <div class="typing-stats">
          <div class="stat-box"><div class="stat-val" id="wpm-val">0</div><div class="stat-lbl">WPM</div></div>
          <div class="stat-box"><div class="stat-val" id="acc-val">100%</div><div class="stat-lbl">Accuracy</div></div>
          <div class="stat-box"><div class="stat-val" id="time-val">0s</div><div class="stat-lbl">Time</div></div>
        </div>
        <div id="ty-msg" style="text-align:center;font-weight:700;min-height:1.5rem;margin-top:0.5rem"></div>
      </div>
    `;
    const td = document.getElementById('td'), ti = document.getElementById('ti');
    finished = false; startTime = null;
    const updateDisplay = (typed) => {
      td.innerHTML = sentence.split('').map((ch, i) => {
        if (i < typed.length) return `<span class="${typed[i]===ch?'correct-char':'wrong-char'}">${ch}</span>`;
        if (i === typed.length) return `<span class="cursor-char">${ch}</span>`;
        return `<span style="color:#4B5563">${ch}</span>`;
      }).join('');
    };
    updateDisplay('');
    ti.addEventListener('input', () => {
      if (finished) return;
      const typed = ti.value;
      if (!startTime && typed.length > 0) startTime = Date.now();
      updateDisplay(typed);
      const elapsed = (Date.now() - startTime) / 1000;
      const words = typed.trim().split(' ').length;
      const wpm = Math.round((words / elapsed) * 60) || 0;
      const correct = typed.split('').filter((c,i) => c === sentence[i]).length;
      const acc = typed.length ? Math.round((correct/typed.length)*100) : 100;
      document.getElementById('wpm-val').textContent = wpm;
      document.getElementById('acc-val').textContent = acc + '%';
      document.getElementById('time-val').textContent = Math.round(elapsed) + 's';
      if (typed === sentence) {
        finished = true;
        if (wpm > bestWPM) bestWPM = wpm;
        sIdx++;
        if (sIdx >= sentences.length) showWin(`Best WPM: ${bestWPM}!`,'⌨️','Speed Demon!');
        else { document.getElementById('ty-msg').innerHTML = `<span style="color:#34D399">✅ ${wpm} WPM — Next sentence…</span>`; setTimeout(render, 1200); }
      }
    });
  };
  render();
}

// ★ NEW GAME 11: FRUIT CUTTING (Canvas-based)
// ============================================================
function initFruitCutting() {
  const area = document.getElementById('game-area');
  area.innerHTML = `
    <div class="fruit-hud">
      <div class="fruit-score-box"><div class="fruit-score-val" id="fc-score">0</div><div class="fruit-score-lbl">Score</div></div>
      <div class="fruit-score-box"><div class="fruit-score-val" id="fc-lives">❤️❤️❤️</div><div class="fruit-score-lbl">Lives</div></div>
      <div class="fruit-score-box"><div class="fruit-score-val" id="fc-combo" style="color:#FF6B9D">x1</div><div class="fruit-score-lbl">Combo</div></div>
    </div>
    <div id="fruit-canvas-wrap">
      <canvas id="fruitCanvas" width="540" height="400"></canvas>
    </div>
    <p style="text-align:center;color:#9CA3AF;margin-top:0.75rem;font-size:0.85rem">✂️ Slice the fruits — miss 3 and it's game over!</p>
  `;

  const canvas = document.getElementById('fruitCanvas');
  const ctx = canvas.getContext('2d');
  const FRUITS = ['🍎','🍊','🍋','🍇','🍓','🍑','🥭','🍍','🍌','🍉','🥝','🫐'];
  const BOMBS = ['💣'];

  let fruits = [], score = 0, lives = 3, combo = 1, running = true;
  let sliceTrail = [], lastSliceTime = 0;
  let animFrame;

  function spawnFruit() {
    const isBomb = Math.random() < 0.12;
    const emoji = isBomb ? '💣' : FRUITS[~~(Math.random()*FRUITS.length)];
    const x = 60 + Math.random() * (canvas.width - 120);
    const vy = -(8 + Math.random() * 6);
    const vx = (Math.random() - 0.5) * 3;
    fruits.push({ x, y: canvas.height + 30, vx, vy, emoji, isBomb, size: 38, sliced: false, slicedAt: 0, opacity: 1, rotation: Math.random()*360, rotSpeed: (Math.random()-0.5)*5 });
  }

  function updateScoreUI() {
    document.getElementById('fc-score').textContent = score;
    document.getElementById('fc-lives').textContent = '❤️'.repeat(lives) + '🖤'.repeat(3-lives);
    document.getElementById('fc-combo').textContent = `x${combo}`;
  }

  let particles = [];
  function spawnParticles(x, y, color) {
    for (let i = 0; i < 8; i++) {
      particles.push({
        x, y,
        vx: (Math.random()-0.5)*8,
        vy: (Math.random()-0.5)*8,
        life: 1, color
      });
    }
  }

  function gameLoop() {
    if (!running) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw trail
    if (sliceTrail.length > 1) {
      ctx.beginPath();
      ctx.moveTo(sliceTrail[0].x, sliceTrail[0].y);
      sliceTrail.forEach(p => ctx.lineTo(p.x, p.y));
      ctx.strokeStyle = 'rgba(255,255,255,0.7)';
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.stroke();
    }
    // Fade trail
    sliceTrail = sliceTrail.filter((p,i) => i > sliceTrail.length - 12);

    // Update particles
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.life -= 0.05;
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 5 * p.life, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    // Update & draw fruits
    fruits = fruits.filter(f => {
      if (f.sliced) {
        f.opacity -= 0.06;
        f.y -= 3;
        return f.opacity > 0;
      }
      f.x += f.vx; f.y += f.vy; f.vy += 0.35;
      f.rotation += f.rotSpeed;
      if (f.y > canvas.height + 50) {
        if (!f.isBomb && !f.sliced) {
          lives--; combo = 1; updateScoreUI();
          if (lives <= 0) { endGame(); return false; }
        }
        return false;
      }
      ctx.save();
      ctx.globalAlpha = f.opacity;
      ctx.translate(f.x, f.y);
      ctx.rotate(f.rotation * Math.PI / 180);
      ctx.font = `${f.size}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(f.emoji, 0, 0);
      ctx.restore();
      return true;
    });

    animFrame = requestAnimationFrame(gameLoop);
  }

  function sliceFruitAt(sx, sy) {
    fruits.forEach(f => {
      if (f.sliced) return;
      const dist = Math.hypot(f.x - sx, f.y - sy);
      if (dist < f.size) {
        f.sliced = true;
        if (f.isBomb) {
          lives--; combo = 1;
          spawnParticles(f.x, f.y, '#F87171');
          updateScoreUI();
          if (lives <= 0) endGame();
        } else {
          score += combo;
          combo = Math.min(combo + 1, 8);
          spawnParticles(f.x, f.y, ['#FF6B9D','#FBBF24','#34D399','#60A5FA'][~~(Math.random()*4)]);
          updateScoreUI();
        }
      }
    });
  }

  // Mouse/touch input
  const wrap = document.getElementById('fruit-canvas-wrap');
  const getPos = (e, isTouch) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const src = isTouch ? e.touches[0] : e;
    return { x: (src.clientX - rect.left) * scaleX, y: (src.clientY - rect.top) * scaleY };
  };
  let isSlicing = false;
  canvas.addEventListener('mousedown', e => { isSlicing = true; sliceTrail = []; });
  canvas.addEventListener('mouseup', () => { isSlicing = false; sliceTrail = []; });
  canvas.addEventListener('mousemove', e => {
    if (!isSlicing) return;
    const pos = getPos(e, false);
    sliceTrail.push(pos);
    sliceFruitAt(pos.x, pos.y);
  });
  canvas.addEventListener('touchstart', e => { e.preventDefault(); isSlicing = true; sliceTrail = []; }, {passive:false});
  canvas.addEventListener('touchend', () => { isSlicing = false; sliceTrail = []; });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!isSlicing) return;
    const pos = getPos(e, true);
    sliceTrail.push(pos);
    sliceFruitAt(pos.x, pos.y);
  }, {passive:false});

  function endGame() {
    running = false;
    cancelAnimationFrame(animFrame);
    clearInterval(spawnInterval);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'rgba(15,10,30,0.85)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font = 'bold 40px Fredoka One, cursive';
    ctx.fillStyle = '#FF6B9D';
    ctx.textAlign = 'center';
    ctx.fillText('Game Over!', canvas.width/2, canvas.height/2 - 30);
    ctx.font = '28px Nunito, sans-serif';
    ctx.fillStyle = '#FBBF24';
    ctx.fillText(`Final Score: ${score}`, canvas.width/2, canvas.height/2 + 20);
    setTimeout(() => showWin(`You sliced ${score} fruits! 🍓 Knife skills on point!`, '🍉', 'Fruit Ninja!'), 1000);
  }

  let spawnInterval;
  gameLoop();
  spawnFruit();
  spawnInterval = setInterval(() => { if(running) spawnFruit(); }, 1100);
  updateScoreUI();
}

      outfit: [
        { slot: 'Top', correct: '👙 Bikini Top', options: ['👙 Bikini Top', '🧥 Puffer Jacket', '👔 Formal Shirt', '🥋 Kimono'] },
        { slot: 'Cover-Up', correct: '🩳 Shorts', options: ['🩳 Shorts', '👗 Evening Gown', '🧣 Wool Scarf', '🥻 Saree'] },
        { slot: 'Accessory', correct: '🕶️ Sunglasses', options: ['🕶️ Sunglasses', '🎩 Top Hat', '🪖 Helmet', '🎓 Graduation Cap'] }
      ]
    },
    {
      theme: '💼 Power Office Look',
      outfit: [
        { slot: 'Top', correct: '👔 Blazer', options: ['👔 Blazer', '🌸 Crop Top', '🩱 Swimsuit', '🥋 Judo Gi'] },
        { slot: 'Bottom', correct: '👖 Tailored Pants', options: ['👖 Tailored Pants', '🩲 Shorts', '🎿 Ski Pants', '🩻 X-Ray'] },
        { slot: 'Shoes', correct: '👠 Heels', options: ['👠 Heels', '🩴 Flip Flops', '🥿 House Slippers', '⛸️ Ice Skates'] }
      ]
    }
  ];

  let roundIdx = 0, pieceIdx = 0, score = 0;

  const render = () => {
    const round = rounds[roundIdx];
    const piece = round.outfit[pieceIdx];
    const shuffled = [...piece.options].sort(() => Math.random()-0.5);

    document.getElementById('game-area').innerHTML = `
      <div class="fashion-area">
        <div style="font-family:'Fredoka One',cursive;font-size:1.5rem;text-align:center;margin-bottom:0.5rem;color:#A78BFA">${round.theme}</div>
        <p style="text-align:center;color:#9CA3AF;margin-bottom:0.75rem">Round ${roundIdx+1}/${rounds.length} • Score: <span style="color:#A78BFA;font-weight:700">${score}</span></p>

        <div class="outfit-display" id="outfit-slots">
          ${round.outfit.map((p,i) => `
            <div class="outfit-piece ${i < pieceIdx ? 'matched' : ''}">
              <span class="outfit-piece-emoji">${i < pieceIdx ? '✅' : i === pieceIdx ? '❓' : '🔒'}</span>
              <div class="outfit-piece-label">${p.slot}</div>
              ${i < pieceIdx ? `<small style="color:#34D399;font-size:0.8rem">${p.correct.split(' ').slice(1).join(' ')}</small>` : ''}
            </div>
          `).join('')}
        </div>

        <div style="background:rgba(255,255,255,0.04);border-radius:16px;padding:1rem;margin:1rem 0;text-align:center">
          <p style="color:#FBBF24;font-weight:700;font-size:1rem;margin-bottom:0.75rem">👗 Choose the ${piece.slot}:</p>
          <div class="fashion-options" id="fo"></div>
        </div>

        <div id="fm-msg" style="text-align:center;font-weight:700;min-height:2rem"></div>
      </div>
    `;

    const fo = document.getElementById('fo');
    shuffled.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'fashion-opt';
      btn.textContent = opt;
      btn.onclick = () => {
        fo.querySelectorAll('.fashion-opt').forEach(b => b.disabled = true);
        if (opt === piece.correct) {
          btn.classList.add('correct'); score++;
          document.getElementById('fm-msg').innerHTML = '<span style="color:#34D399">✨ Fab choice! Perfect match!</span>';
        } else {
          btn.classList.add('wrong');
          fo.querySelectorAll('.fashion-opt').forEach(b => { if(b.textContent === piece.correct) b.classList.add('correct'); });
          document.getElementById('fm-msg').innerHTML = `<span style="color:#F87171">❌ Not quite! Better choice: ${piece.correct}</span>`;
        }
        setTimeout(() => {
          pieceIdx++;
          if (pieceIdx >= round.outfit.length) {
            pieceIdx = 0; roundIdx++;
            if (roundIdx >= rounds.length) {
              showWin(`Fashion score: ${score}! You're a style icon! 👗`, '👗', 'Fashion Queen!');
            } else {
              document.getElementById('fm-msg').innerHTML = '<span style="color:#A78BFA">🎉 Outfit complete! Next look…</span>';
              setTimeout(render, 1200);
            }
          } else {
            render();
          }
        }, 1100);
      };
      fo.appendChild(btn);
    });
  };
  render();
}

setupStarfield();
setupHeroChars();
setupCharGrid();
</script>
